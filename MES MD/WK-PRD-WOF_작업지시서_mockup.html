<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업지시서 양식 목업 — WK-PRD-WOF</title>
<style>
  :root{ --ink:#1f1f1f; --line:#2b2b2b; --grid:#9a9a92; --soft:#eceae3; --kbg:#f6f5f0; --muted:#6b6b66; --hl:#fff3c4; --hlline:#d99c00; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#e6e6e2; color:var(--ink);
        font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif; font-size:14px; }
  .wrap{ max-width:820px; margin:0 auto; padding:16px 12px 60px; }
  .ctrl{ background:#fff; border:1px solid #d3d3cd; border-radius:10px; padding:12px 14px; margin-bottom:16px; }
  .ctrl h1{ font-size:14px; margin:0 0 10px; font-weight:700; letter-spacing:.5px; }
  .ctrl .row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:6px 0; }
  .ctrl .lab{ width:74px; color:var(--muted); font-size:12px; }
  .seg{ border:1px solid #c9c9c2; background:#fafafa; padding:6px 13px; border-radius:7px; cursor:pointer; font-size:13px; font-family:inherit; }
  .seg:hover{ background:#f0f0ea; }
  .seg.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .seg.gas.on{ background:var(--hlline); color:#3a2c00; border-color:var(--hlline); }
  .printbtn{ margin-left:auto; border:1px solid #c9c9c2; background:#fafafa; padding:6px 14px; border-radius:7px; cursor:pointer; font-family:inherit; font-size:13px; }

  .sheet{ background:#fff; border:2px solid var(--line); width:190mm; min-height:277mm; margin:0 auto;
          box-shadow:0 1px 8px rgba(0,0,0,.14); display:flex; flex-direction:column; }
  /* header band */
  .hd{ display:flex; border-bottom:2px solid var(--line); }
  .hd .ttl{ flex:1; padding:14px 20px; }
  .hd .ttl .big{ font-size:32px; font-weight:800; letter-spacing:12px; }
  .hd .ttl .sub{ font-size:15px; color:var(--muted); margin-top:5px; letter-spacing:2px; }
  .hd .meta{ width:54mm; border-left:2px solid var(--line); display:flex; flex-direction:column; }
  .hd .meta .stamp{ flex:1; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; letter-spacing:8px; }
  .hd .meta .dt{ border-top:1px solid var(--line); padding:7px 10px; font-size:13px; color:var(--muted); text-align:center; }
  .stamp.gray{ color:#5f5e5a; } .stamp.red{ color:#a32d2d; } .stamp.navy{ color:#0c447c; } .stamp.teal{ color:#0f6e56; }
  /* unified data grid — aligned dividers */
  .form{ display:grid; grid-template-columns:104px 1fr 104px 1fr; border-left:0; }
  .form > div{ border-right:1px solid var(--grid); border-bottom:1px solid var(--grid); padding:0 12px; min-height:44px; display:flex; align-items:center; font-size:16px; }
  .form > div:nth-child(4n){ border-right:none; }
  .form .sh{ grid-column:1/-1; background:var(--soft); border-right:none; font-weight:700; font-size:15px; letter-spacing:3px; min-height:34px; }
  .form .k{ background:var(--kbg); font-weight:700; font-size:14.5px; color:#3a3a3a; line-height:1.25; }
  .form .full{ grid-column:1/-1; border-right:none; }
  .form .v3{ grid-column:span 3; border-right:none; }
  .form .bc{ grid-column:span 2; padding:10px 14px; }
  .form .big{ font-size:22px; font-weight:700; }
  .bcgraf{ height:48px; display:flex; align-items:flex-end; gap:2px; }
  .bcgraf span{ width:3px; background:#1f1f1f; }
  .bcnum{ font-size:15px; letter-spacing:4px; margin-top:6px; }
  .tagrow{ gap:8px; }
  .tag{ display:inline-block; font-size:13px; padding:3px 11px; border-radius:5px; background:#fbeaea; color:#a32d2d; border:1px solid #eab6b6; }
  .tag.wt{ background:#e1f5ee; color:#0f6e56; border-color:#9fe1cb; }
  .chips{ flex-wrap:wrap; gap:8px; padding:11px 12px; }
  .chip{ border:1px solid #c9c9c2; background:#fafafa; border-radius:16px; padding:5px 15px; font-size:14px; color:#555; }
  .chip.on{ background:var(--hl); border-color:var(--hlline); color:#5a4400; font-weight:700; box-shadow:0 0 0 1px var(--hlline) inset; }
  .gastitle{ font-size:15px; }
  .gastitle b{ font-size:18px; }
  .badge{ display:inline-block; padding:3px 11px; border-radius:12px; font-size:13px; font-weight:700; margin-left:8px; }
  .b-ing{ background:#faeeda; color:#854f0b; } .b-done{ background:#eaf3de; color:#3b6d11; } .b-wait{ background:#eee; color:#555; }
  /* image area — vertical large block */
  .imgsec{ flex:1 1 auto; display:flex; flex-direction:column; border-top:2px solid var(--line); min-height:120px; }
  .imgsec .cap{ background:var(--soft); border-bottom:1px solid var(--grid); padding:7px 14px; font-weight:700; font-size:16px; letter-spacing:2px; }
  .imgframe{ flex:1; display:flex; padding:8mm 14mm; }
  .imgph{ flex:1; border:2px dashed #c2c2ba; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:#9a9a92; }
  .imgph .lbl{ font-size:15px; color:#8a8a82; letter-spacing:1px; }
  @page{ size:A4 portrait; margin:10mm; }
  @media print{
    body{ background:#fff; }
    .ctrl{ display:none; }
    .wrap{ padding:0; margin:0; max-width:none; }
    .sheet{ width:auto; min-height:0; height:277mm; box-shadow:none; border-width:1.5px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="ctrl">
    <h1>작업지시서 양식 목업 · WK-PRD-WOF(작업지시서양식)</h1>
    <div class="row"><span class="lab">공정</span>
      <button class="seg proc on" data-p="TSP">조판·출력</button>
      <button class="seg proc" data-p="PRN">인쇄</button>
      <button class="seg proc" data-p="FAB">가공</button>
      <button class="printbtn" onclick="window.print()">인쇄 / PDF</button>
    </div>
    <div class="row"><span class="lab">주문유형</span>
      <button class="seg ord on" data-o="일반">일반</button>
      <button class="seg ord" data-o="긴급">긴급</button>
      <button class="seg ord" data-o="고액">고액</button>
      <button class="seg ord" data-o="해외">해외</button>
      <button class="seg ord" data-o="별도">별도</button>
    </div>
    <div class="row gasrow" style="display:none"><span class="lab">강조 가공</span><span id="gasbtns"></span></div>
  </div>

  <div class="sheet" id="sheet"></div>
</div>

<script>
const D={
  품목:'명함', 바코드:'3479', 작성일시:'2024-07-25  14:32', 가공수량:'500 매', 제품사이즈:'90 × 50 mm',
  출력:[['조판담당','홍길순'],['출력담당','김효성'],['조판번호','3479 (돈땡)'],['출력기기','출력 4호기'],['CTP규격','1060 × 795'],['시작시간','20:18:05'],['수량','8'],['종료시간','20:19:15'],['추가사용','1'],['소요시간','00:01:10'],['사유','판까짐'],['진행현황','출력완료']],
  인쇄:[['인쇄담당','김길동'],['시작시간','20:18:05'],['인쇄기기','옵셋 6호기'],['종료시간','20:19:15'],['인쇄유형','전면 4도 / 후면 4도'],['소요시간','00:01:10'],['용지명','반누보 화이트 204g'],['진행현황','인쇄중'],['규격','636 × 939'],['수량','500 / 50'],['사유','요고레'],['추가사용','100']],
  가공:[
    {명:'코팅', 상태:'가공중', 상세:[['코팅 면','양면'],['코팅 종류','무광'],['규격','636 × 939'],['수량','500 매']]},
    {명:'12p접지', 상태:'가공대기', 상세:[['접지 방식','12P 두루마리'],['접는 수','11 회'],['규격','636 × 939'],['수량','500 매']]},
    {명:'재단', 상태:'가공완료', 상세:[['재단 규격','90 × 50'],['재단 수량','8,000 매'],['여분','100 매'],['칼선','일반']]},
    {명:'실크', 상태:'가공대기', 상세:[['색상','먹 (K)'],['위치','전면 로고'],['도수','1 도'],['건조','UV']]},
    {명:'미싱', 상태:'가공대기', 상세:[['위치','중앙 1선'],['땀 간격','3 mm'],['길이','90 mm'],['방향','가로']]}
  ],
  생산:[['접수일시','2024-07-23  20:18'],['납기일','2024-07-26'],['배송방법','택배'],['메모','조판완료 시 색상 재확인 요망']]
};
const ORD={
  일반:{tone:'gray', header:[], amount:true},
  긴급:{tone:'red', header:[['긴급요청자','영업담당 유종식'],['제작담당','오향근'],['출고담당','박영숙']], amount:true, emph:true},
  고액:{tone:'navy', header:[['접수담당','조영희'],['제작담당','오향근'],['검수담당','이연희'],['배송담당','이현준']], amount:false},
  해외:{tone:'teal', header:[['접수담당','조영희'],['검수담당','이연희'],['포장담당','조태영'],['배송담당','방영수']], amount:false, weight:'5.45 kg'},
  별도:{tone:'red', header:[['별도요청자','영업담당 유종식'],['제작담당','오향근'],['출고담당','박영숙']], amount:true, emph:true}
};
const PROCNAME={TSP:'조판 · 출력', PRN:'인쇄', FAB:'가공'};
let S={p:'TSP', o:'일반', g:0};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function pairs(arr){ let s=''; const n=arr.length;
  arr.forEach(([k,v],i)=>{ const lo=(i===n-1)&&(n%2===1);
    s+='<div class="k">'+esc(k)+'</div><div class="v'+(lo?' v3':'')+'">'+esc(v)+'</div>'; });
  return s; }
function sh(t){ return '<div class="sh">'+esc(t)+'</div>'; }
function badge(st){ const m={'가공중':'b-ing','가공완료':'b-done','가공대기':'b-wait'}; return '<span class="badge '+(m[st]||'b-wait')+'">'+st+'</span>'; }
function barcode(num){ let b=''; for(let i=0;i<52;i++) b+='<span style="height:'+(24+(i*7%22))+'px;width:'+((i%4==0)?4:2)+'px"></span>';
  return '<div class="bcgraf">'+b+'</div><div class="bcnum">'+esc(num)+'</div>'; }

function imgPrepress(){
  return '<svg width="320" height="200" viewBox="0 0 320 200"><rect x="34" y="20" width="200" height="120" fill="#fff" stroke="#8f8f88" stroke-width="1.5"/>'
    +'<rect x="50" y="40" width="54" height="54" fill="#eef2f8" stroke="#b3c6dd"/>'
    +'<line x1="120" y1="48" x2="214" y2="48" stroke="#3a3a3a" stroke-width="4"/>'
    +'<line x1="120" y1="66" x2="196" y2="66" stroke="#8f8f88" stroke-width="2.5"/>'
    +'<line x1="50" y1="112" x2="214" y2="112" stroke="#bcbcb4" stroke-width="1.5"/>'
    +'<line x1="50" y1="124" x2="170" y2="124" stroke="#bcbcb4" stroke-width="1.5"/>'
    +'<rect x="246" y="20" width="58" height="120" fill="#f4f4ee" stroke="#cbcbc4" stroke-dasharray="4 3"/>'
    +'<text x="275" y="84" font-size="11" fill="#9a9a92" text-anchor="middle" transform="rotate(90 275 84)">재단 여백</text></svg>';
}
function imgFab(name){
  return '<svg width="320" height="200" viewBox="0 0 320 200"><rect x="60" y="18" width="200" height="128" fill="#fff" stroke="#8f8f88" stroke-width="1.5"/>'
    +'<rect x="60" y="18" width="200" height="128" fill="#fff7df" opacity="0.55"/>'
    +'<rect x="84" y="40" width="152" height="84" fill="none" stroke="#d99c00" stroke-width="2.5" stroke-dasharray="8 4"/>'
    +'<text x="160" y="86" font-size="19" fill="#6a5200" text-anchor="middle" font-weight="700">'+esc(name)+'</text>'
    +'<text x="160" y="108" font-size="11" fill="#9a8a55" text-anchor="middle">가공 위치 표시</text></svg>';
}

function render(){
  const o=ORD[S.o], pn=PROCNAME[S.p];
  let h='';
  h+='<div class="hd"><div class="ttl"><div class="big">작업지시서</div><div class="sub">'+pn+' 작업지시서</div></div>'
    +'<div class="meta"><div class="stamp '+o.tone+'">'+S.o+'</div><div class="dt">작성  '+D.작성일시+'</div></div></div>';

  let f='';
  // order-type 담당 block
  let hdr=o.header.slice(); if(o.weight) hdr=hdr.concat([['중량',o.weight]]);
  if(hdr.length) f+=sh('주문 담당')+pairs(hdr);
  // barcode + 품목
  f+='<div class="bc">'+barcode(D.바코드)+'</div><div class="k">품목</div><div class="v big">'+D.품목+'</div>';
  // tags row (금액 미표시 / 중량 / 강조)
  let tags='';
  if(o.emph) tags+='<span class="tag">긴급/별도 — 강조 관리</span>';
  if(o.amount===false) tags+='<span class="tag">금액 미표시</span>';
  if(o.weight) tags+='<span class="tag wt">중량 표시 ('+o.weight+')</span>';
  if(tags) f+='<div class="full tagrow">'+tags+'</div>';
  // 공정 현황
  if(S.p==='TSP'){ f+=sh('출력 현황')+pairs(D.출력); }
  else if(S.p==='PRN'){ f+=sh('인쇄 현황')+pairs(D.인쇄)
      +'<div class="full" style="background:#fff9e6;color:#8a6d00;font-size:14px">※ 인쇄완료 바코드 인식 시 작업지시서 재출력 (담당 조 확인)</div>'; }
  else { const g=D.가공[S.g];
    const ident=[['조판번호',D.바코드+' (돈땡)'],['수량',D.가공수량],['제품 디자인 사이즈',D.제품사이즈]];
    let chips=D.가공.map((x,i)=>'<span class="chip'+(i===S.g?' on':'')+'">'+x.명+'</span>').join('');
    f+=sh('가공 현황 · 총 '+D.가공.length+'건')+pairs(ident)
      +'<div class="full chips">'+chips+'</div>'
      +'<div class="full gastitle">강조 가공 &nbsp;<b>'+g.명+'</b>'+badge(g.상태)+'</div>'
      +pairs(g.상세); }
  // 생산정보
  f+=sh('생산 정보')+pairs(D.생산);
  h+='<div class="form">'+f+'</div>';

  // image area (vertical large)
  let cap, img;
  if(S.p==='FAB'){ cap='제품 가공 이미지'; img=imgFab(D.가공[S.g].명); }
  else { cap='조판 이미지'; img=imgPrepress(); }
  h+='<div class="imgsec"><div class="cap">'+cap+'</div><div class="imgframe"><div class="imgph">'+img
    +'<div class="lbl">'+cap+(S.p==='FAB'?' — '+D.가공[S.g].명:'')+'</div></div></div></div>';

  document.getElementById('sheet').innerHTML=h;
  document.querySelector('.gasrow').style.display=(S.p==='FAB')?'flex':'none';
  if(S.p==='FAB'){
    document.getElementById('gasbtns').innerHTML=D.가공.map((x,i)=>'<button class="seg gas'+(i===S.g?' on':'')+'" data-g="'+i+'">'+x.명+'</button>').join(' ');
    document.querySelectorAll('#gasbtns .gas').forEach(b=>b.onclick=()=>{S.g=+b.dataset.g; render();});
  }
}
document.querySelectorAll('.proc').forEach(b=>b.onclick=()=>{S.p=b.dataset.p; document.querySelectorAll('.proc').forEach(x=>x.classList.toggle('on',x===b)); render();});
document.querySelectorAll('.ord').forEach(b=>b.onclick=()=>{S.o=b.dataset.o; document.querySelectorAll('.ord').forEach(x=>x.classList.toggle('on',x===b)); render();});
render();
</script>
</body>
</html>
